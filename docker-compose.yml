services:
  postgres:
    image: postgres:16-alpine
    container_name: centavo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: centavo
      POSTGRES_PASSWORD: centavo
      POSTGRES_DB: centavo
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: